aid: lazada
name: Lazada
description: |
  Lazada Group is a Southeast Asian e-commerce platform owned by
  Alibaba Group since 2016, operating localized marketplaces in
  Singapore, Malaysia, Indonesia, Thailand, the Philippines, and
  Vietnam. Lazada Open Platform (openapi.lazada.com) provides a
  partner-facing REST API for sellers, brands, ERP / OMS vendors,
  and TP (TaoBao Partner) developers — covering Product / Category
  catalog, Order processing, Logistics and shipping label
  generation, Finance and payout reconciliation, Shop and Seller
  profile, Promotion management (vouchers, FlexiCombo, Sponsored
  Solutions), Image / asset upload, Returns and reverse logistics,
  and Bidirectional message webhooks. Authentication uses an App
  Key + App Secret plus a per-seller access token issued via
  OAuth-style seller authorization, with all requests signed
  using HMAC-SHA256 in Alibaba's TOP signature scheme.
