features:
  - name: Six-Country SEA Marketplace
    description: A single API surface supports sellers across Lazada Singapore, Malaysia, Indonesia, Thailand, Philippines, and Vietnam.
  - name: Alibaba TOP Signature Auth
    description: Requests are signed using Alibaba's TOP HMAC-SHA256 scheme over App Key, App Secret, timestamp, and parameters.
  - name: Push Webhooks
    description: Real-time order, return, product, and chat events are delivered to partner endpoints for synchronization.
  - name: End-to-End Seller Operations
    description: Coverage spans products, orders, logistics, finance, promotions, images, returns, and IM in one platform.
  - name: TP (TaoBao Partner) Program
    description: Vetted TP / Lazada Partner developers gain higher quotas and certified-app status for marketplace distribution.
useCases:
  - name: ERP / OMS Integration
    description: ERP and OMS vendors connect sellers' inventory, orders, and fulfillment to Lazada marketplaces.
  - name: Multi-Country Selling
    description: Brand owners manage products and orders across all six Lazada country marketplaces from a single integration.
  - name: Marketing Automation
    description: Automate vouchers, FlexiCombo bundles, and promotions through API-driven marketing workflows.
  - name: Reconciliation
    description: Pull finance and transaction data into accounting systems for Lazada settlement reconciliation.
integrations:
  - name: Shopify
  - name: WooCommerce
  - name: Magento
  - name: BigCommerce
  - name: SAP
  - name: Oracle NetSuite
  - name: Lazada Logistics (LEX)
  - name: Ninja Van
  - name: J&T Express
authentication:
  - type: AppKeyHMAC
    description: Each request is signed with HMAC-SHA256 using the App Secret over App Key, parameters, timestamp, and HTTP path.
  - type: SellerAccessToken
    description: Seller-scoped access tokens are issued via the seller authorization flow and refreshed via refresh tokens.
  - type: WebhookSignature
    description: Push notification deliveries are signed; partners verify signatures with their App Secret before processing.
